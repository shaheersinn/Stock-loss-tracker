name: Stock Price Alert

on:
  schedule:
    # Runs every 15 minutes during US market hours (Mon–Fri, 13:30–21:00 UTC = 9:30am–5pm ET)
    - cron: "*/15 13-20 * * 1-5"   # every 15 min, 1:00–8:45pm UTC weekdays
    - cron: "0 21 * * 1-5"         # catch the 4pm ET close candle
  workflow_dispatch:                 # allow manual runs any time

permissions:
  contents: write   # needed to commit alert_state.json back to the repo

jobs:
  check-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock alert check
        env:
          TELEGRAM_TOKEN: ${{ 8592580519:AAECf_seT98zqVaspfEtQEqmv-3_pijeUEA }}
          TELEGRAM_CHAT_ID: ${{ 8088654393 }}
        run: python alert.py

      - name: Commit updated alert state (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alert_state.json
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push
